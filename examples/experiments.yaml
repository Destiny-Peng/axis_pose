# Example experiment sweep configuration for tools/experiment_runner.py
# Keys in `sweeps` are dot-separated parameter paths into the params YAML
# Example: 'pose_estimate.voxel_leaf_size' or just 'voxel_leaf_size' if params are flat

base_params_file: "/home/jacy/project/final_design/axispose/config/param.yaml" # optional: path to a base params YAML; if empty, an empty params object is used
launch_cmd: "ros2 launch axispose launch.py"
statistics_base_dir: "./statistics_runs"
run_duration_sec: 8
repeats: 2
sweeps:
  voxel_leaf_size: [0.01, 0.02]
  use_sor: [true, false]
