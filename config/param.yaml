/**:
  ros__parameters:
    publish_rate: 1.0
    frame_id: camera_color_optical_frame
    camera_name: d457
    loop: true
    voxel_leaf_size: 0.04
    sor_mean_k: 20.0
    sor_std_mul: 0.5
    statistics_enabled: true
    use_sor: true
    use_euclidean_cluster: true
    sacline_distance_threshold: 0.2
    evaluation_timeout_seconds: 65
    groundtruth_eval_enabled: false
    groundtruth_images_dir: ""
    groundtruth_camera_info_file: config/d457_color.yaml
    groundtruth_tag_size_m: 0.05
    cluster_mode: 3 # 0: max-cluster->z-bin->SACLine, 1: largest cluster, 2: RANSAC line inliers, 3: raw mask-only cloud
    color_image_topic: /camera/color/image_raw
    depth_image_topic: /camera/depth/image_rect_raw
    color_camera_info_topic: /camera/color/camera_info
    depth_camera_info_topic: /camera/depth/camera_info
    mask_topic: /yolo/mask
    tracked_object_topic: /yolo/tracked_objects
    tracked_objects_topic: /yolo/tracked_objects
    tracked_pose_topic: /shaft/tracked_poses
    tracking_enabled: true
    lost_grace_frames: 15
    reacquire_confirm_frames: 2
    iou_keep_min: 0.70
    center_dist_max_ratio: 0.15
    debug_topic: /yolo/seg_debug
    input_mode: caminfo_only #input mode: 'driver'|'bag'|'caminfo_only'
    debug_flags: ["debug_cloud"]
    save_visualization: false
    save_every_n: 1
    kalman_enabled: true
    kalman_position_process_noise: 0.05
    kalman_position_measurement_noise: 0.02
    kalman_axis_process_noise: 0.01
    kalman_axis_measurement_noise: 0.01
    kalman_initial_covariance: 0.5
    kalman_min_dt: 0.001
    kalman_max_dt: 0.5
    # Adaptive Kalman parameters
    kalman_adaptive_enabled: true
    kalman_adaptive_scale: 10.0
    kalman_innovation_threshold: 0.02
    kalman_adaptive_decay: 0.9
    kalman_reset_on_large_jump: false
    kalman_reset_threshold: 0.2
    ceres_max_iterations: 100
    ceres_max_points: 1000
    ceres_weight_2d: 1.5
    ceres_weight_pos: 5.0
    ceres_weight_3d_pos: 2.0
    x_plane_d: 6.0
    # Z-bin segmentation parameters for mode0 (max-cluster -> z-bin -> sacline)
    z_bin_width: 0.02
    z_bin_peak_ratio: 0.5
    z_bin_min_bins: 3
    z_bin_axis: z
    # Debug: publish per-object pointclouds for diagnosis (disabled by default)
    debug_publish_pointclouds: true
    debug_publish_only_on_anomaly: false
    debug_publish_max_points: 5000
    debug_publish_raw_pointclouds: true
